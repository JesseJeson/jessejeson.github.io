<head>
  <!-- Vssue 的样式文件 -->
  <link rel="stylesheet" href="https://unpkg.com/vssue/dist/vssue.min.css">
</head>

<body>
  <div id="vssue"></div>

  <!-- 先引入 Vue -->
 <!-- Vue 运行时版 (runtime only)  -->
  <script src="https://unpkg.com/vue/dist/vue.runtime.min.js"></script>

  <!-- 在 Vue 之后引入 Vssue -->

  <!-- 或： Vssue Gitee 版  -->
  <script src="https://unpkg.com/vssue/dist/vssue.gitee.min.js"></script>
  <!-- 将 Vssue 作为 Vue 组件使用 -->

  <!-- 对于 Vue 运行时版，使用渲染函数（render function） -->
  <script>
    new Vue({
      el: '#vssue',

      render: h => h('Vssue', {
        props: {
          // 在这里设置当前页面对应的 Issue 标题
          title: 'p{[pid]}',

          // 在这里设置你使用的平台的 OAuth App 配置
          options: {
            owner: 'histcat',
            repo: 'vssue',
            clientId: 'cbab7b8ba337349bc6f816892853f87295232733bd97fd881e412bb7271c47b1',
            clientSecret: 'd8d28118894af291c9fb31c8fed99fdaf9b9474972eb3eb81ac2a8c8521c8a10', // 只有在使用某些平台时需要
          },
        }
      })
    })
  </script>
